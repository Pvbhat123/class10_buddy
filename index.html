<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class10 Buddy</title>

    <!-- MathJax for rendering mathematical formulas -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: clamp(10px, 2vw, 20px);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: clamp(1.8em, 4vw + 1em, 2.5em);
            margin-bottom: 10px;
        }

        .header p {
            font-size: clamp(0.95em, 2vw + 0.5em, 1.1em);
            opacity: 0.9;
        }

        .search-section {
            padding: clamp(20px, 3vw, 30px);
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        #queryInput {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s;
        }

        #queryInput:focus {
            border-color: #667eea;
        }

        #searchBtn {
            padding: 15px 40px;
            font-size: 16px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #searchBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        #searchBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
            font-size: 18px;
        }

        .results-info {
            padding: 15px;
            background: #f5f7fa;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: bold;
            color: #333;
        }

        .result-card {
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .result-card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .result-number {
            font-weight: bold;
            color: #667eea;
            font-size: 1.1em;
        }

        .similarity-badge {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
        }

        .result-content {
            color: #333;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #c33;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 1.2em;
        }

        .refined-answer {
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
            border: 2px solid #667eea;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.1);
        }

        .refined-answer-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #667eea;
        }

        .ai-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
        }

        .refined-answer-title {
            color: #667eea;
            font-size: clamp(1.1em, 2vw + 0.6em, 1.3em);
            font-weight: bold;
        }

        .refined-answer-content {
            color: #333;
            line-height: 1.8;
            font-size: clamp(0.95em, 1.5vw + 0.5em, 1.05em);
        }

        .refined-answer-content h1,
        .refined-answer-content h2,
        .refined-answer-content h3 {
            color: #667eea;
            margin-top: 20px;
            margin-bottom: 10px;
        }

        .refined-answer-content ul,
        .refined-answer-content ol {
            margin-left: 25px;
            margin-bottom: 15px;
        }

        .refined-answer-content li {
            margin-bottom: 8px;
        }

        .refined-answer-content p {
            margin-bottom: 12px;
        }

        .refined-answer-content code {
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
        }

        .refined-answer-content strong {
            color: #764ba2;
        }

        .toggle-chunks {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
            transition: all 0.3s;
        }

        .toggle-chunks:hover {
            background: #667eea;
            color: white;
        }

        .chunks-section {
            margin-top: 20px;
        }

        .chunks-hidden {
            display: none;
        }

        /* ===== RESPONSIVE DESIGN ===== */

        /* Mobile devices (portrait phones, less than 768px) */
        @media (max-width: 767px) {
            body {
                padding: 10px;
            }

            .container {
                border-radius: 10px;
            }

            .header {
                padding: 20px 15px;
            }

            .header h1 {
                font-size: 1.8em;
                margin-bottom: 8px;
            }

            .header p {
                font-size: 0.95em;
            }

            .search-section {
                padding: 20px 15px;
            }

            .search-box {
                flex-direction: column;
                gap: 12px;
            }

            #queryInput {
                padding: 12px;
                font-size: 16px; /* Prevents zoom on iOS */
                width: 100%;
            }

            #searchBtn {
                padding: 12px 20px;
                width: 100%;
                font-size: 16px;
            }

            #searchBtn:hover {
                transform: none; /* Remove hover effects on mobile */
            }

            .loading {
                font-size: 16px;
                padding: 15px;
            }

            .results-info {
                padding: 12px;
                font-size: 0.9em;
            }

            .result-card {
                padding: 15px;
                margin-bottom: 12px;
            }

            .result-card:hover {
                transform: none; /* Remove hover effects on mobile */
            }

            .result-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .result-number {
                font-size: 1em;
            }

            .similarity-badge {
                padding: 4px 12px;
                font-size: 0.85em;
            }

            .result-content {
                font-size: 0.95em;
            }

            .refined-answer {
                padding: 18px;
                margin-bottom: 20px;
            }

            .refined-answer-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
                padding-bottom: 12px;
            }

            .ai-badge {
                padding: 6px 14px;
                font-size: 0.85em;
            }

            .refined-answer-title {
                font-size: 1.1em;
            }

            .refined-answer-content {
                font-size: 0.95em;
                line-height: 1.7;
            }

            .refined-answer-content h1 {
                font-size: 1.4em;
                margin-top: 15px;
            }

            .refined-answer-content h2 {
                font-size: 1.2em;
                margin-top: 12px;
            }

            .refined-answer-content h3 {
                font-size: 1.05em;
                margin-top: 10px;
            }

            .refined-answer-content ul,
            .refined-answer-content ol {
                margin-left: 20px;
                margin-bottom: 12px;
            }

            .refined-answer-content li {
                margin-bottom: 6px;
            }

            .toggle-chunks {
                padding: 10px 16px;
                width: 100%;
                font-size: 0.9em;
            }

            .no-results {
                padding: 30px 15px;
                font-size: 1em;
            }

            .error {
                padding: 12px;
                font-size: 0.9em;
            }
        }

        /* Tablets (landscape phones and portrait tablets, 768px to 1024px) */
        @media (min-width: 768px) and (max-width: 1024px) {
            body {
                padding: 15px;
            }

            .container {
                max-width: 100%;
            }

            .header {
                padding: 25px;
            }

            .header h1 {
                font-size: 2.2em;
            }

            .header p {
                font-size: 1.05em;
            }

            .search-section {
                padding: 25px;
            }

            .search-box {
                gap: 12px;
            }

            #queryInput {
                padding: 14px;
            }

            #searchBtn {
                padding: 14px 35px;
            }

            .refined-answer {
                padding: 22px;
            }

            .result-card {
                padding: 18px;
            }
        }

        /* Large desktops (1400px and up) */
        @media (min-width: 1400px) {
            .container {
                max-width: 1200px;
            }

            .header h1 {
                font-size: 2.8em;
            }

            .header p {
                font-size: 1.15em;
            }

            .search-section {
                padding: 40px;
            }

            .refined-answer {
                padding: 30px;
            }

            .refined-answer-content {
                font-size: 1.1em;
            }
        }

        /* Landscape orientation specific adjustments for mobile */
        @media (max-width: 767px) and (orientation: landscape) {
            .header h1 {
                font-size: 1.5em;
                margin-bottom: 5px;
            }

            .header p {
                font-size: 0.9em;
            }

            .search-section {
                padding: 15px;
            }

            .search-box {
                flex-direction: row;
            }

            #searchBtn {
                width: auto;
                min-width: 120px;
            }
        }

        /* Touch device optimization - Remove hover effects */
        @media (hover: none) and (pointer: coarse) {
            .result-card:hover {
                transform: none;
                box-shadow: none;
            }

            #searchBtn:hover {
                transform: none;
                box-shadow: none;
            }

            .toggle-chunks:hover {
                background: white;
                color: #667eea;
            }
        }

        /* High DPI displays */
        @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
            .container {
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
            }

            .result-card {
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            }
        }

        /* Print styles */
        @media print {
            body {
                background: white;
                padding: 0;
            }

            .container {
                box-shadow: none;
                max-width: 100%;
            }

            .header {
                background: none;
                color: black;
                border-bottom: 2px solid #333;
            }

            .search-section {
                display: none;
            }

            .result-card {
                page-break-inside: avoid;
                border: 1px solid #333;
            }

            #searchBtn {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Class10 Buddy</h1>
            <p>Got a doubt? Just ask and get the correct explanation.</p>
        </div>

        <div class="search-section">
            <div class="search-box">
                <input
                    type="text"
                    id="queryInput"
                    placeholder="Type your question here..."
                    autocomplete="off"
                >
                <button id="searchBtn">Search</button>
            </div>

            <div id="results"></div>
        </div>
    </div>

    <script>
        const queryInput = document.getElementById('queryInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultsDiv = document.getElementById('results');

        async function search() {
            const query = queryInput.value.trim();

            if (!query) {
                resultsDiv.innerHTML = '<div class="error">Please enter a question</div>';
                return;
            }

            searchBtn.disabled = true;
            resultsDiv.innerHTML = '<div class="loading">Searching and analyzing with AI...</div>';

            try {
                const response = await fetch('/search', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ query: query })
                });

                const data = await response.json();

                if (!response.ok) {
                    resultsDiv.innerHTML = `<div class="error">Error: ${data.error}</div>`;
                    return;
                }

                if (data.count === 0) {
                    resultsDiv.innerHTML = '<div class="no-results">No matching results found</div>';
                    return;
                }

                let html = '';

                // Add refined answer from Gemini
                if (data.refined_answer) {
                    html += `
                        <div class="refined-answer">
                            <div class="refined-answer-header">
                                <span class="ai-badge">AI Answer</span>
                                <span class="refined-answer-title">Refined Response</span>
                            </div>
                            <div class="refined-answer-content">
                                ${markdownToHtml(data.refined_answer)}
                            </div>
                        </div>
                    `;
                }

                resultsDiv.innerHTML = html;

                // Trigger MathJax to render mathematical formulas
                if (typeof MathJax !== 'undefined') {
                    MathJax.typesetPromise([resultsDiv]).catch((err) => console.log('MathJax error:', err));
                }

            } catch (error) {
                resultsDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            } finally {
                searchBtn.disabled = false;
            }
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function markdownToHtml(markdown) {
            // Simple markdown to HTML converter with LaTeX math support
            let html = markdown;

            // Protect LaTeX math expressions (inline and block)
            const mathExpressions = [];

            // Block math: $$...$$
            html = html.replace(/\$\$([\s\S]*?)\$\$/g, (match, expr) => {
                mathExpressions.push(`\\[${expr}\\]`);
                return `MATH_BLOCK_${mathExpressions.length - 1}`;
            });

            // Inline math: $...$
            html = html.replace(/\$([^\$\n]+?)\$/g, (match, expr) => {
                mathExpressions.push(`\\(${expr}\\)`);
                return `MATH_INLINE_${mathExpressions.length - 1}`;
            });

            // Headers
            html = html.replace(/### (.*?)$/gm, '<h3>$1</h3>');
            html = html.replace(/## (.*?)$/gm, '<h2>$1</h2>');
            html = html.replace(/# (.*?)$/gm, '<h1>$1</h1>');

            // Bold
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/__(.*?)__/g, '<strong>$1</strong>');

            // Italic (avoid matching math)
            html = html.replace(/\*([^\*]+?)\*/g, '<em>$1</em>');

            // Unordered lists
            html = html.replace(/^\* (.*?)$/gm, '<li>$1</li>');
            html = html.replace(/^- (.*?)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*?<\/li>\n?)+/gs, '<ul>$&</ul>');

            // Ordered lists
            html = html.replace(/^\d+\. (.*?)$/gm, '<li>$1</li>');

            // Code blocks
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

            // Line breaks
            html = html.replace(/\n\n/g, '</p><p>');
            html = '<p>' + html + '</p>';

            // Restore math expressions
            html = html.replace(/MATH_BLOCK_(\d+)/g, (match, index) => mathExpressions[parseInt(index)]);
            html = html.replace(/MATH_INLINE_(\d+)/g, (match, index) => mathExpressions[parseInt(index)]);

            return html;
        }

        function toggleChunks() {
            const chunksSection = document.getElementById('chunksSection');
            const toggleBtn = document.querySelector('.toggle-chunks');

            if (chunksSection.classList.contains('chunks-hidden')) {
                chunksSection.classList.remove('chunks-hidden');
                toggleBtn.textContent = toggleBtn.textContent.replace('Show', 'Hide');
            } else {
                chunksSection.classList.add('chunks-hidden');
                toggleBtn.textContent = toggleBtn.textContent.replace('Hide', 'Show');
            }
        }

        searchBtn.addEventListener('click', search);
        queryInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                search();
            }
        });
    </script>
</body>
</html>
